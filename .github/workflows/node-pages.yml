name: NodeJS

on:
  push:
    branches: [ "main" ]
    paths:
      - "versesurf-editor/**"    
      - ".github/workflows/node-pages.yml"
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      working-directory: versesurf-editor
      run: |
        npm install
        npm run build
        
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Upload build output
        path: 'versesurf-editor/dist'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
