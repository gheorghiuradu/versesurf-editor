table:
  name: playlists
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: created_by
array_relationships:
  - name: plays
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: plays
          schema: public
  - name: reports
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: reports
          schema: public
  - name: songs
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: songs
          schema: public
  - name: votes
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: votes
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - name
        - enabled
        - picture_url
        - created_by
        - created_at
        - spotify_id
        - created_by_name
        - created_by_avatar_url
      filter: {}
      allow_aggregations: true
  - role: me
    permission:
      columns:
        - id
        - name
        - enabled
        - picture_url
        - created_by
        - created_at
        - spotify_id
        - created_by_name
        - created_by_avatar_url
      filter: {}
      allow_aggregations: true
      query_root_fields:
        - select
        - select_aggregate
        - select_by_pk
      subscription_root_fields:
        - select
        - select_aggregate
        - select_by_pk
  - role: public
    permission:
      columns:
        - id
        - name
        - enabled
        - picture_url
        - created_by
        - created_at
        - spotify_id
        - created_by_name
        - created_by_avatar_url
      filter: {}
      allow_aggregations: true
  - role: user
    permission:
      columns:
        - id
        - name
        - enabled
        - picture_url
        - created_by
        - created_at
        - spotify_id
        - created_by_name
        - created_by_avatar_url
      filter: {}
      allow_aggregations: true
delete_permissions:
  - role: user
    permission:
      filter:
        created_by:
          _eq: X-Hasura-User-Id
